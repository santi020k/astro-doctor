name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      matrix:
        node-version: [22.x, 24.x]

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Turborepo cache
        uses: actions/cache@v6
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ matrix.node-version }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ matrix.node-version }}-
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Run CI checks (Node 22.x)
        if: matrix.node-version == '22.x'
        run: pnpm exec turbo run typecheck lint test:coverage //#lint:spell //#lint:knip //#lint:repo

      - name: Run CI checks (Node 24.x)
        if: matrix.node-version == '24.x'
        run: pnpm exec turbo run typecheck lint test:coverage

      - name: Check exports (Node 22.x)
        if: matrix.node-version == '22.x'
        run: pnpm run check:exports

  windows-smoke:
    name: Windows smoke
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (serialised to avoid native-binary contention on Windows)
        run: pnpm exec turbo run build --concurrency=1 --output-logs=new-only

      - name: Run scanner tests on Windows
        run: pnpm --filter @santi020k/astro-doctor exec vitest run tests/scanner/file-discovery.test.ts --maxWorkers=1
