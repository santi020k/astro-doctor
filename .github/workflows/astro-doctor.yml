name: Astro Doctor

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: astro-doctor-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  astro-doctor:
    name: Astro Doctor scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          # fetch-depth: 0 is required for diff mode (comparing against merge-base)
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - uses: ./
        with:
          working-directory: .
          fail-on: error
          comment: true
          diff-only: true
