name: Stale

on:
  schedule:
    # Runs every day at 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and close stale issues & PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: "status: stale"
          stale-issue-message: >
            This issue has been inactive for 60 days. It will be closed in 14 days
            unless there is new activity. If this is still relevant, please leave a
            comment or remove the **status: stale** label.
          close-issue-message: >
            Closing due to inactivity. Feel free to reopen if this is still relevant.
          close-issue-reason: not_planned

          # Pull Requests
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-pr-label: "status: stale"
          stale-pr-message: >
            This pull request has been inactive for 30 days. It will be closed in 7 days
            unless there is new activity. If you're still working on it, please push an
            update or remove the **status: stale** label.
          close-pr-message: >
            Closing due to inactivity. Feel free to reopen if you'd like to continue.

          # Never mark these as stale
          exempt-issue-labels: "status: in progress,status: blocked,type: bug"
          exempt-pr-labels: "status: in progress,status: blocked"
          exempt-draft-pr: true

          # Avoid spamming — process at most 30 items per run
          operations-per-run: 30
